name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    name: 'Create release'

    permissions:
      contents: write

    secrets:
      TYPO3_API_TOKEN: ${{ secrets.TYPO3_API_TOKEN }}

    uses: eliashaeussler/gha/.github/workflows/extension-release.yaml@dc5fa2548158a3fb7537863ff248cfc98596b06a # 0.2.0
    with:
      php-version: 8.2 # renovate-ignore
      packaging-excludes-file: Build/packaging_exclude.php
