name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    name: 'Create release'

    permissions:
      contents: write

    secrets:
      TYPO3_API_TOKEN: ${{ secrets.TYPO3_API_TOKEN }}

    uses: eliashaeussler/gha/.github/workflows/extension-release.yaml@18254c00b1f6945b335092e72fb38a75deeba889 # 0.2.1
    with:
      php-version: 8.2 # renovate-ignore
      packaging-excludes-file: Build/packaging_exclude.php
