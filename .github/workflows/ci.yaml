name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  prepare:
    name: 'Prepare workflow'
    uses: eliashaeussler/gha/.github/workflows/preparation.yaml@2d0e88cdf429b8ef1117ca8cd9d53e327340827d # 0.4.9

  asset-integrity:
    name: 'Verify asset integrity'

    needs: [prepare]
    if: ${{ needs.prepare.outputs.continue == 'true' }}

    secrets:
      ASSETS_TOKEN: ${{ secrets.REBUILD_ASSETS_TOKEN }}

    uses: eliashaeussler/gha/.github/workflows/asset-integrity.yaml@2d0e88cdf429b8ef1117ca8cd9d53e327340827d # 0.4.9
    with:
      base-path: Build/assets

  checks:
    name: 'Checks'

    needs: [asset-integrity]
    if: ${{ needs.asset-integrity.outputs.rebuilt == 'false' }}

    permissions:
      security-events: write

    uses: eliashaeussler/gha/.github/workflows/checks.yaml@2d0e88cdf429b8ef1117ca8cd9d53e327340827d # 0.4.9
    with:
      # We use the minimum supported PHP version
      php-version: 8.2 # renovate-ignore
      npm: true
      assets-path: Build/assets

  tests:
    name: 'Tests (PHP ${{ matrix.php-version }}, TYPO3 ${{ matrix.typo3-version }} & ${{ matrix.dependencies }} dependencies)'

    needs: [asset-integrity]
    if: ${{ needs.asset-integrity.outputs.rebuilt == 'false' }}

    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.2", "8.3", "8.4", "8.5"]
        typo3-version: ["13.4", "14.3"]
        dependencies: ["highest", "lowest"]

    uses: eliashaeussler/gha/.github/workflows/composer-tests.yaml@2d0e88cdf429b8ef1117ca8cd9d53e327340827d # 0.4.9
    with:
      php-version: ${{ matrix.php-version }}
      typo3-version: ${{ matrix.typo3-version }}
      dependencies: ${{ matrix.dependencies }}
      boot-mysql: true

  test-coverage:
    name: 'Test coverage'

    needs: [asset-integrity]
    if: ${{ needs.asset-integrity.outputs.rebuilt == 'false' }}

    uses: eliashaeussler/gha/.github/workflows/composer-test-coverage.yaml@2d0e88cdf429b8ef1117ca8cd9d53e327340827d # 0.4.9
    with:
      coverage-file: Build/tests/coverage/clover.xml
      boot-mysql: true
